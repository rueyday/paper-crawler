name: Build and Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        run: |
          npm install
          npm run build
        env:
          VITE_USERNAME: ${{ secrets.VITE_USERNAME }}
          VITE_PASSWORD_HASH: ${{ secrets.VITE_PASSWORD_HASH }}
          VITE_GITHUB_REPO: ${{ secrets.VITE_GITHUB_REPO }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deploy
        uses: actions/deploy-pages@v4
